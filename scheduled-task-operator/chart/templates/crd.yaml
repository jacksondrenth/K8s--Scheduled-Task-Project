apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scheduledtasks.ops.io
spec:
  group: ops.io
  names:
    kind: ScheduledTask
    plural: scheduledtasks
    singular: scheduledtask
    shortNames:
      - st
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["schedule", "image", "command"]
              properties:
                schedule:
                  type: string
                image:
                  type: string
                command:
                  type: array
                  items:
                    type: string
                suspended:
                  type: boolean
                  default: false
                jitter:
                  type: integer
                  default: 0
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}